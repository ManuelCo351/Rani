<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial 🌻</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fffef0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Fondo decorativo de girasoles flotantes */
        .sunflower-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-petal {
            position: absolute;
            font-size: 24px;
            animation: floatAnimation 8s infinite linear;
            opacity: 0.7;
        }

        @keyframes floatAnimation {
            0% {
                transform: translateY(105vh) rotate(0deg) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg) translateX(50px);
                opacity: 0;
            }
        }

        /* Contenedor principal de la pregunta */
        .container {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #ffca28;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(93, 64, 37, 0.15);
            max-width: 400px;
            width: 90%;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            color: #4e342e;
            font-size: 26px;
            margin-bottom: 30px;
            line-height: 1.4;
            font-weight: 700;
        }

        .sunflower-icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Botones */
        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 80px;
            position: relative;
        }

        .btn {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #btnSi {
            background-color: #ffca28;
            color: #4e342e;
            border: 2px solid #f57f17;
        }

        #btnSi:active {
            transform: scale(0.95);
        }

        #btnNo {
            background-color: #7d6b67;
            color: #ffffff;
            position: absolute;
            z-index: 999;
            transition: all 0.1s ease;
            touch-action: none; /* Evita zoom o retrasos en móvil */
        }

        /* Pantalla de Regalo y Galería */
        #regalo-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            z-index: 10;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-regalo {
            background: #fff;
            border: 2px solid #ffca28;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header-regalo h2 {
            color: #4e342e;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header-regalo p {
            color: #6d4c41;
            font-size: 16px;
        }

        /* Galería de Fotos estilo Polaroid */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
            margin-top: 20px;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 25px 15px;
            box-shadow: 0 10px 25px rgba(93, 64, 37, 0.12);
            border-radius: 2px;
            width: 100%;
            max-width: 340px;
            transition: transform 0.3s ease;
            border: 1px solid #f5f2eb;
        }

        /* Alternamos la rotación para un efecto más artesanal y lindo */
        .polaroid:nth-child(odd) {
            transform: rotate(-3deg);
        }
        .polaroid:nth-child(even) {
            transform: rotate(3deg);
        }

        .polaroid:hover {
            transform: rotate(0deg) scale(1.04);
            z-index: 20;
        }

        .polaroid img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 1px solid #e0e0e0;
            background-color: #fafafa;
        }

        .polaroid .caption {
            font-family: "Georgia", serif;
            font-style: italic;
            margin-top: 15px;
            color: #5d4037;
            font-size: 16px;
            word-wrap: break-word;
        }

        /* Ajuste para pantallas grandes (Grid en vez de columna única si hay espacio) */
        @media (min-width: 600px) {
            .gallery {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 25px;
            }
            .polaroid {
                width: calc(50% - 15px);
            }
        }
    </style>
</head>
<body>

    <!-- Fondo de Girasoles Flotantes -->
    <div class="sunflower-bg" id="bgPetals"></div>

    <!-- PANTALLA 1: PREGUNTA INTERACTIVA -->
    <div class="container" id="pregunta-screen">
        <div class="sunflower-icon">🌻</div>
        <h1 id="titulo">¿Querés intentarlo de nuevo? 💛</h1>
        
        <div class="buttons-container">
            <button id="btnSi" class="btn" onclick="mostrarRegalo()">Sí ✨</button>
            <button id="btnNo" class="btn">No 💔</button>
        </div>
    </div>

    <!-- PANTALLA 2: REVELACIÓN Y GALERÍA -->
    <div id="regalo-screen">
        <div class="header-regalo">
            <div style="font-size: 40px; margin-bottom: 5px;">🌻✨💛</div>
            <h2>¡Sabía que ibas a decir que sí!</h2>
            <p>Acá tenés tu regalo... un pedacito de nosotros 📝</p>
        </div>

        <div class="gallery">
            <!-- Foto 1 -->
           

            <!-- Foto 2 -->
            <div class="polaroid">
                <img src="imagen2.jpg" alt="Nuestra Foto 2" onerror="this.src='https://images.unsplash.com/photo-1541250848049-b4f7141dca3f?w=500&auto=format&fit=crop&q=60';">
                <div class="caption">Tus sonrisas favoritas ✨</div>
            </div>

            <!-- Foto 3 -->
            <div class="polaroid">
                <img src="imagen3.jpg" alt="Nuestra Foto 3" onerror="this.src='https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?w=500&auto=format&fit=crop&q=60';">
                <div class="caption">Complicidad pura 💛</div>
            </div>

            <!-- Foto 4 -->
            <div class="polaroid">
                <img src="imagen4.jpg" alt="Nuestra Foto 4" onerror="this.src='https://images.unsplash.com/photo-1508747703725-719777637510?w=500&auto=format&fit=crop&q=60';">
                <div class="caption">Cada segundo con vos 😊</div>
            </div>

            <!-- Foto 5 -->
            <div class="polaroid">
                <img src="imagen5.jpg" alt="Nuestra Foto 5" onerror="this.src='https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=500&auto=format&fit=crop&q=60';">
                <div class="caption">Nuestros mejores días 🗺️</div>
            </div>

            <!-- Foto 6 -->
            <div class="polaroid">
                <img src="imagen6.jpg" alt="Nuestra Foto 6" onerror="this.src='https://images.unsplash.com/photo-1470240731273-7821a6eeb6bd?w=500&auto=format&fit=crop&q=60';">
                <div class="caption">Abrazos que curan todo M️</div>
            </div>

            <!-- Foto 7 -->
            <div class="polaroid">
                <img src="imagen7.jpg" alt="Nuestra Foto 7" onerror="this.src='https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?w=500&auto=format&fit=crop&q=60';">
                <div class="caption">Por muchos más girasoles juntos 🥂</div>
            </div>
        </div>
    </div>

    <script>
        // Generar pétalos y girasoles flotantes continuamente en el fondo
        const bgPetals = document.getElementById('bgPetals');
        const elements = ['🌻', '✨', '💛', '🍂'];
        
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('floating-petal');
            petal.innerText = elements[Math.floor(Math.random() * elements.length)];
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 4 + 5) + 's'; // Entre 5 y 9 segundos
            petal.style.fontSize = (Math.random() * 15 + 15) + 'px'; // Tamaños variados
            
            bgPetals.appendChild(petal);
            
            setTimeout(() => {
                petal.remove();
            }, 9000);
        }
        
        setInterval(createPetal, 400);

        // Lógica interactiva para que el botón "No" se escape (Soporta Mouse y Touch de Celular)
        const btnNo = document.getElementById('btnNo');

        function moverBotonNo(e) {
            // Previene el comportamiento por defecto en móviles (como scroll)
            if(e.type === 'touchstart') e.preventDefault();
            
            // Calculamos límites para que no se salga de la pantalla visible
            const pad = 20;
            const maxX = window.innerWidth - btnNo.offsetWidth - pad;
            const maxY = window.innerHeight - btnNo.offsetHeight - pad;
            
            // Generamos posiciones aleatorias seguras
            let randomX = Math.floor(Math.random() * (maxX - pad)) + pad;
            let randomY = Math.floor(Math.random() * (maxY - pad)) + pad;
            
            // Cambiamos a posición fija para que vuele por toda la pantalla
            btnNo.style.position = 'fixed';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // Eventos tanto para computadora como para pantalla táctil
        btnNo.addEventListener('mouseover', moverBotonNo);
        btnNo.addEventListener('touchstart', moverBotonNo);

        // Función cuando le da click a "Sí"
        function mostrarRegalo() {
            document.getElementById('pregunta-screen').style.display = 'none';
            document.getElementById('regalo-screen').style.display = 'block';
            
            // Hacer scroll automático hacia arriba por las dudas
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
